<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tetris Ultimate</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
margin:0;
}

#ui{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
flex-wrap:wrap;
}

canvas{
background:#000;
border:3px solid white;
touch-action:none;
}

#panel{text-align:left;}

button{
font-size:18px;
padding:10px 16px;
margin:4px;
border-radius:10px;
border:none;
background:#444;
color:white;
}

#controls{margin-top:10px}

/* overlay */

#overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:rgba(0,0,0,.8);
font-size:36px;
opacity:1;
pointer-events:auto;
transition:0.3s;
}

.hidden{
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Tetris Ultimate</h1>

<div id="ui">

<canvas id="game" width="240" height="400"></canvas>

<div id="panel">

<div>Score: <span id="score">0</span></div>
<div>Level: <span id="level">1</span></div>

<p>Next</p>
<canvas id="next" width="80" height="80"></canvas>

<p>Hold</p>
<canvas id="hold" width="80" height="80"></canvas>

</div>
</div>

<div id="controls">
<button onclick="move(-1)">◀</button>
<button onclick="rotatePlayer()">⟳</button>
<button onclick="move(1)">▶</button>
<button onclick="drop()">▼</button>
<button onclick="hardDrop()">⤓</button>
<button onclick="hold()">HOLD</button>
<button onclick="togglePause()">PAUSE</button>
</div>

<div id="overlay">
<div id="overText">TAP START</div>
<button onclick="startGame()">START</button>
</div>

<script>

/* canvas */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
ctx.scale(20,20)

const nextCanvas=document.getElementById("next")
const nextCtx=nextCanvas.getContext("2d")
nextCtx.scale(20,20)

const holdCanvas=document.getElementById("hold")
const holdCtx=holdCanvas.getContext("2d")
holdCtx.scale(20,20)

/* game state */

const arena=createMatrix(12,20)

let score=0
let level=1
let lines=0

let dropInterval=1000

const player={
pos:{x:0,y:0},
matrix:null
}

let nextPiece=null
let holdPiece=null
let holdUsed=false
let paused=true

/* colors */

const colors=[null,"#0ff","#ff0","#f80","#00f","#0f0","#f00","#f0f"]

/* pieces */

function createPiece(type){

if(type==="T")return[[0,1,0],[1,1,1],[0,0,0]]
if(type==="O")return[[2,2],[2,2]]
if(type==="L")return[[0,3,0],[0,3,0],[0,3,3]]
if(type==="J")return[[0,4,0],[0,4,0],[4,4,0]]
if(type==="I")return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]]
if(type==="S")return[[0,6,6],[6,6,0],[0,0,0]]
if(type==="Z")return[[7,7,0],[0,7,7],[0,0,0]]

}

function randomPiece(){
const p="TJLOSZI"
return createPiece(p[Math.floor(Math.random()*p.length)])
}

/* matrix */

function createMatrix(w,h){
const m=[]
while(h--)m.push(new Array(w).fill(0))
return m
}

/* draw */

function drawMatrix(matrix,offset,context=ctx){

matrix.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
context.fillStyle=colors[v]
context.fillRect(x+offset.x,y+offset.y,1,1)
}
})
})

}

function draw(){

ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawMatrix(arena,{x:0,y:0})

if(player.matrix)
drawMatrix(player.matrix,player.pos)

drawNext()
drawHold()

}

function drawNext(){
nextCtx.clearRect(0,0,80,80)
if(nextPiece)drawMatrix(nextPiece,{x:1,y:1},nextCtx)
}

function drawHold(){
holdCtx.clearRect(0,0,80,80)
if(holdPiece)drawMatrix(holdPiece,{x:1,y:1},holdCtx)
}

/* collision */

function collide(arena,player){

for(let y=0;y<player.matrix.length;y++)
for(let x=0;x<player.matrix[y].length;x++)
if(player.matrix[y][x]!==0 &&
(arena[y+player.pos.y] &&
arena[y+player.pos.y][x+player.pos.x])!==0)
return true

return false

}

/* merge */

function merge(arena,player){

player.matrix.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v)arena[y+player.pos.y][x+player.pos.x]=v
})
})

}

/* line clear */

function sweep(){

for(let y=arena.length-1;y>0;y--){

if(arena[y].every(v=>v!==0)){

const row=arena.splice(y,1)[0].fill(0)
arena.unshift(row)

score+=100
lines++

}

}

level=1+Math.floor(lines/10)
dropInterval=Math.max(100,1000-(level*70))

}

/* movement */

function move(dir){

player.pos.x+=dir
if(collide(arena,player))player.pos.x-=dir

}

function drop(){

player.pos.y++

if(collide(arena,player)){

player.pos.y--

merge(arena,player)

resetPlayer()

sweep()

updateUI()

}

dropCounter=0

}

function hardDrop(){

while(!collide(arena,player))
player.pos.y++

player.pos.y--

drop()

}

/* rotate */

function rotate(m){

for(let y=0;y<m.length;y++)
for(let x=0;x<y;x++)
[m[x][y],m[y][x]]=[m[y][x],m[x][y]]

m.forEach(r=>r.reverse())

}

function rotatePlayer(){

rotate(player.matrix)

if(collide(arena,player)){
rotate(player.matrix)
rotate(player.matrix)
rotate(player.matrix)
}

}

/* hold */

function hold(){

if(holdUsed)return

if(!holdPiece){

holdPiece=player.matrix
resetPlayer()

}else{

[holdPiece,player.matrix]=[player.matrix,holdPiece]

player.pos.y=0
player.pos.x=5

}

holdUsed=true

}

/* reset */

function resetPlayer(){

player.matrix=nextPiece||randomPiece()

nextPiece=randomPiece()

player.pos.y=0
player.pos.x=5

holdUsed=false

if(collide(arena,player))gameOver()

}

/* UI */

function updateUI(){

document.getElementById("score").innerText=score
document.getElementById("level").innerText=level

}

/* loop */

let dropCounter=0
let last=0

function update(time=0){

if(paused)return

const delta=time-last
last=time

dropCounter+=delta

if(dropCounter>dropInterval)drop()

draw()

requestAnimationFrame(update)

}

/* pause */

function togglePause(){

paused=!paused
if(!paused)update()

}

/* game over */

function gameOver(){

paused=true

document.getElementById("overlay").classList.remove("hidden")
document.getElementById("overText").innerText="GAME OVER"

}

/* start */

function startGame(){

arena.forEach(r=>r.fill(0))

score=0
level=1
lines=0

holdPiece=null

nextPiece=randomPiece()
player.matrix=randomPiece()

player.pos.y=0
player.pos.x=5

updateUI()

paused=false

document.getElementById("overlay").classList.add("hidden")

last=0
dropCounter=0

update()

}

/* keyboard */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft")move(-1)
if(e.key==="ArrowRight")move(1)
if(e.key==="ArrowDown")drop()
if(e.key==="ArrowUp")rotatePlayer()
if(e.key===" ")hardDrop()
if(e.key==="Shift")hold()

})

</script>

</body>
</html>
