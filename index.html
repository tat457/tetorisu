<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tetris</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
margin:0;
}

canvas{
background:#000;
border:3px solid white;
touch-action:none;
}

button{
font-size:18px;
padding:10px 16px;
margin:4px;
border-radius:10px;
border:none;
background:#444;
color:white;
}

#overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:rgba(0,0,0,.8);
font-size:36px;
}

#ui{
margin-top:10px;
}

</style>
</head>

<body>

<h1>Tetris</h1>

<div id="ui">
<div>Score: <span id="score">0</span></div>
<div>Level: <span id="level">1</span></div>
</div>

<canvas id="game" width="240" height="400"></canvas>

<div>
<button onclick="move(-1)">◀</button>
<button onclick="rotatePlayer()">⟳</button>
<button onclick="move(1)">▶</button>
<button onclick="drop()">▼</button>
<button onclick="hardDrop()">⤓</button>
</div>

<div id="overlay">
<div id="overText">TAP START</div>
<button onclick="startGame()">START</button>
</div>

<script>

/* canvas */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
ctx.scale(20,20)

/* game state */

const arena=createMatrix(12,20)

let score=0
let level=1
let lines=0

let dropInterval=1000
let dropCounter=0
let last=0
let paused=true

const player={
pos:{x:0,y:0},
matrix:null
}

/* colors */

const colors=[null,"#0ff","#ff0","#f80","#00f","#0f0","#f00","#f0f"]

/* pieces */

function createPiece(type){

if(type==="T")return[[0,1,0],[1,1,1],[0,0,0]]
if(type==="O")return[[2,2],[2,2]]
if(type==="L")return[[0,3,0],[0,3,0],[0,3,3]]
if(type==="J")return[[0,4,0],[0,4,0],[4,4,0]]
if(type==="I")return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]]
if(type==="S")return[[0,6,6],[6,6,0],[0,0,0]]
if(type==="Z")return[[7,7,0],[0,7,7],[0,0,0]]

}

function randomPiece(){
const p="TJLOSZI"
return createPiece(p[Math.floor(Math.random()*p.length)])
}

/* matrix */

function createMatrix(w,h){
const m=[]
while(h--)m.push(new Array(w).fill(0))
return m
}

/* draw */

function drawMatrix(matrix,offset){

matrix.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
ctx.fillStyle=colors[v]
ctx.fillRect(x+offset.x,y+offset.y,1,1)
}
})
})

}

function draw(){

ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawMatrix(arena,{x:0,y:0})

if(player.matrix)
drawMatrix(player.matrix,player.pos)

}

/* collision */

function collide(arena,player){

for(let y=0;y<player.matrix.length;y++)
for(let x=0;x<player.matrix[y].length;x++)
if(player.matrix[y][x]!==0 &&
(arena[y+player.pos.y] &&
arena[y+player.pos.y][x+player.pos.x])!==0)
return true

return false

}

/* merge */

function merge(arena,player){

player.matrix.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v)arena[y+player.pos.y][x+player.pos.x]=v
})
})

}

/* line clear */

function sweep(){

let cleared=0

for(let y=arena.length-1;y>=0;y--){

if(arena[y].every(v=>v!==0)){

arena.splice(y,1)
arena.unshift(new Array(12).fill(0))

cleared++
y++

}

}

if(cleared>0){

lines+=cleared
score+=cleared*100

level=1+Math.floor(lines/10)

dropInterval=Math.max(100,1000-(level*80))

updateUI()

}

}

/* movement */

function move(dir){

player.pos.x+=dir
if(collide(arena,player))player.pos.x-=dir

}

function drop(){

player.pos.y++

if(collide(arena,player)){

player.pos.y--

merge(arena,player)

resetPlayer()

sweep()

}

dropCounter=0

}

function hardDrop(){

while(!collide(arena,player))
player.pos.y++

player.pos.y--

drop()

}

/* rotate */

function rotate(m){

for(let y=0;y<m.length;y++)
for(let x=0;x<y;x++)
[m[x][y],m[y][x]]=[m[y][x],m[x][y]]

m.forEach(r=>r.reverse())

}

function rotatePlayer(){

rotate(player.matrix)

if(collide(arena,player)){
rotate(player.matrix)
rotate(player.matrix)
rotate(player.matrix)
}

}

/* reset */

function resetPlayer(){

player.matrix=randomPiece()

player.pos.y=0
player.pos.x=5

if(collide(arena,player))gameOver()

}

/* UI */

function updateUI(){

document.getElementById("score").innerText=score
document.getElementById("level").innerText=level

}

/* loop */

function update(time=0){

if(paused)return

const delta=time-last
last=time

dropCounter+=delta

if(dropCounter>dropInterval)drop()

draw()

requestAnimationFrame(update)

}

/* game over */

function gameOver(){

paused=true

const overlay=document.getElementById("overlay")
overlay.style.display="flex"

document.getElementById("overText").innerText="GAME OVER"

}

/* start */

function startGame(){

const overlay=document.getElementById("overlay")
overlay.style.display="none"

arena.forEach(r=>r.fill(0))

score=0
level=1
lines=0

updateUI()

player.matrix=randomPiece()
player.pos.y=0
player.pos.x=5

paused=false

last=0
dropCounter=0

update()

}

/* keyboard */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft")move(-1)
if(e.key==="ArrowRight")move(1)
if(e.key==="ArrowDown")drop()
if(e.key==="ArrowUp")rotatePlayer()
if(e.key===" ")hardDrop()

})

</script>

</body>
</html>
