<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tetris Ultimate</title>

<style>
body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
margin:0;
}

#ui{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
flex-wrap:wrap;
}

canvas{
background:#000;
border:3px solid white;
}

#panel{
text-align:left;
}

button{
font-size:20px;
padding:12px 20px;
margin:5px;
border-radius:10px;
border:none;
background:#444;
color:white;
}

#controls{
margin-top:10px;
}

#overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.8);
font-size:40px;
flex-direction:column;
}
.hidden{display:none}
</style>
</head>

<body>

<h1>Tetris Ultimate</h1>

<div id="ui">

<canvas id="game" width="240" height="400"></canvas>

<div id="panel">

<div>Score: <span id="score">0</span></div>
<div>Level: <span id="level">1</span></div>

<p>Next</p>
<canvas id="next" width="80" height="80"></canvas>

<p>Hold</p>
<canvas id="hold" width="80" height="80"></canvas>

</div>

</div>

<div id="controls">
<button onclick="move(-1)">◀</button>
<button onclick="rotatePlayer()">⟳</button>
<button onclick="move(1)">▶</button>
<button onclick="drop()">▼</button>
<button onclick="hardDrop()">⤓</button>
<button onclick="hold()">HOLD</button>
<button onclick="togglePause()">PAUSE</button>
</div>

<div id="overlay" class="hidden">
<div id="overText"></div>
<button onclick="startGame()">START</button>
</div>

<script>

/* ===== Canvas ===== */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
ctx.scale(20,20)

const nextCanvas=document.getElementById("next")
const nextCtx=nextCanvas.getContext("2d")
nextCtx.scale(20,20)

const holdCanvas=document.getElementById("hold")
const holdCtx=holdCanvas.getContext("2d")
holdCtx.scale(20,20)

/* ===== Audio ===== */

const audioCtx=new(window.AudioContext||window.webkitAudioContext)()

function beep(freq){
const o=audioCtx.createOscillator()
const g=audioCtx.createGain()
o.frequency.value=freq
o.connect(g)
g.connect(audioCtx.destination)
o.start()
g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.15)
}

/* ===== Game state ===== */

const arena=createMatrix(12,20)

let score=0
let level=1
let lines=0

let dropInterval=1000

const player={
pos:{x:0,y:0},
matrix:null
}

let nextPiece=null
let holdPiece=null
let holdUsed=false
let paused=false

/* ===== Shapes ===== */

const colors=[
null,
"#0ff","#ff0","#f80","#00f","#0f0","#f00","#f0f"
]

function createPiece(type){

if(type==="T")return[[0,1,0],[1,1,1],[0,0,0]]
if(type==="O")return[[2,2],[2,2]]
if(type==="L")return[[0,3,0],[0,3,0],[0,3,3]]
if(type==="J")return[[0,4,0],[0,4,0],[4,4,0]]
if(type==="I")return[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]]
if(type==="S")return[[0,6,6],[6,6,0],[0,0,0]]
if(type==="Z")return[[7,7,0],[0,7,7],[0,0,0]]

}

function randomPiece(){
const p="TJLOSZI"
return createPiece(p[Math.floor(Math.random()*p.length)])
}

/* ===== Matrix ===== */

function createMatrix(w,h){
const m=[]
while(h--)m.push(new Array(w).fill(0))
return m
}

/* ===== Draw ===== */

function drawMatrix(matrix,offset,context=ctx){

matrix.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v){
context.fillStyle=colors[v]
context.fillRect(x+offset.x,y+offset.y,1,1)
}
})
})

}

function draw(){

ctx.fillStyle="#000"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawMatrix(arena,{x:0,y:0})

drawGhost()

drawMatrix(player.matrix,player.pos)

drawNext()
drawHold()

}

/* ===== Ghost piece ===== */

function drawGhost(){

let y=player.pos.y

while(!collide(arena,{pos:{x:player.pos.x,y:y+1},matrix:player.matrix}))y++

ctx.globalAlpha=.3
drawMatrix(player.matrix,{x:player.pos.x,y:y})
ctx.globalAlpha=1

}

/* ===== Next/Hold ===== */

function drawNext(){

nextCtx.clearRect(0,0,80,80)

if(nextPiece)
drawMatrix(nextPiece,{x:1,y:1},nextCtx)

}

function drawHold(){

holdCtx.clearRect(0,0,80,80)

if(holdPiece)
drawMatrix(holdPiece,{x:1,y:1},holdCtx)

}

/* ===== Collision ===== */

function collide(arena,player){

for(let y=0;y<player.matrix.length;y++)
for(let x=0;x<player.matrix[y].length;x++)
if(player.matrix[y][x]!==0 &&
(arena[y+player.pos.y]&&
arena[y+player.pos.y][x+player.pos.x])!==0)
return true

return false

}

/* ===== Merge ===== */

function merge(arena,player){

player.matrix.forEach((row,y)=>{
row.forEach((v,x)=>{
if(v)arena[y+player.pos.y][x+player.pos.x]=v
})
})

}

/* ===== Line clear ===== */

function sweep(){

let rowCount=1

outer:
for(let y=arena.length-1;y>0;y--){

for(let x=0;x<arena[y].length;x++)
if(arena[y][x]===0)continue outer

const row=arena.splice(y,1)[0].fill(0)
arena.unshift(row)
y++

score+=rowCount*100
lines++
rowCount*=2

beep(600)

}

level=1+Math.floor(lines/10)
dropInterval=1000-(level*70)

}

/* ===== Movement ===== */

function move(dir){

player.pos.x+=dir
if(collide(arena,player))player.pos.x-=dir

}

function drop(){

player.pos.y++

if(collide(arena,player)){

player.pos.y--

merge(arena,player)

resetPlayer()

sweep()

updateUI()

}

dropCounter=0

}

function hardDrop(){

while(!collide(arena,player))
player.pos.y++

player.pos.y--

drop()

}

/* ===== Rotate ===== */

function rotate(m){

for(let y=0;y<m.length;y++)
for(let x=0;x<y;x++)
[m[x][y],m[y][x]]=[m[y][x],m[x][y]]

m.forEach(r=>r.reverse())

}

function rotatePlayer(){

rotate(player.matrix)

if(collide(arena,player)){
rotate(player.matrix)
rotate(player.matrix)
rotate(player.matrix)
}

}

/* ===== Hold ===== */

function hold(){

if(holdUsed)return

if(!holdPiece){

holdPiece=player.matrix
resetPlayer()

}else{

[holdPiece,player.matrix]=[player.matrix,holdPiece]

player.pos.y=0
player.pos.x=5

}

holdUsed=true

}

/* ===== Reset player ===== */

function resetPlayer(){

player.matrix=nextPiece||randomPiece()

nextPiece=randomPiece()

player.pos.y=0
player.pos.x=5

holdUsed=false

if(collide(arena,player))gameOver()

}

/* ===== UI ===== */

function updateUI(){

document.getElementById("score").innerText=score
document.getElementById("level").innerText=level

}

/* ===== Loop ===== */

let dropCounter=0
let last=0

function update(t=0){

if(paused)return

const d=t-last
last=t

dropCounter+=d

if(dropCounter>dropInterval)drop()

draw()

requestAnimationFrame(update)

}

/* ===== Pause ===== */

function togglePause(){

paused=!paused

if(!paused)update()

}

/* ===== Game over ===== */

function gameOver(){

paused=true

document.getElementById("overlay").classList.remove("hidden")
document.getElementById("overText").innerText="GAME OVER"

}

/* ===== Start ===== */

function startGame(){

arena.forEach(r=>r.fill(0))

score=0
level=1
lines=0

nextPiece=randomPiece()
holdPiece=null

resetPlayer()

updateUI()

paused=false

document.getElementById("overlay").classList.add("hidden")

update()

}

/* ===== Touch swipe ===== */

let touchX=0
let touchY=0

canvas.addEventListener("touchstart",e=>{
touchX=e.touches[0].clientX
touchY=e.touches[0].clientY
})

canvas.addEventListener("touchend",e=>{

let dx=e.changedTouches[0].clientX-touchX
let dy=e.changedTouches[0].clientY-touchY

if(Math.abs(dx)>Math.abs(dy)){

if(dx>30)move(1)
if(dx<-30)move(-1)

}else{

if(dy>30)drop()
if(dy<-30)rotatePlayer()

}

})

/* ===== Keyboard ===== */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft")move(-1)
if(e.key==="ArrowRight")move(1)
if(e.key==="ArrowDown")drop()
if(e.key==="ArrowUp")rotatePlayer()
if(e.key===" ")hardDrop()
if(e.key==="Shift")hold()

})

startGame()

</script>

</body>
</html>
