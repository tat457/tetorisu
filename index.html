<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Tetris Pro</title>

<style>

/* 画面デザイン */

body{
 background:#111;
 color:white;
 text-align:center;
 font-family:sans-serif;
}

canvas{
 background:black;
 margin-top:20px;
 border:3px solid white;
}

#score{
 font-size:20px;
}

</style>
</head>


<body>

<h1>Tetris</h1>

<div id="score">Score: 0</div>

<canvas id="tetris" width="240" height="400"></canvas>

<script>

/* =======================
   キャンバス準備
======================= */

const canvas=document.getElementById("tetris")
const context=canvas.getContext("2d")

context.scale(20,20)

/* =======================
   スコア
======================= */

let score=0

function updateScore(){

document.getElementById("score").innerText=
"Score: "+score

}


/* =======================
   フィールド
======================= */

const arena=createMatrix(12,20)


/* =======================
   プレイヤー
======================= */

const player={
pos:{x:0,y:0},
matrix:null
}


/* =======================
   空の盤面
======================= */

function createMatrix(w,h){

const matrix=[]

while(h--){
matrix.push(new Array(w).fill(0))
}

return matrix

}


/* =======================
   テトリミノ
======================= */

function createPiece(type){

if(type==="T"){

return[
[0,1,0],
[1,1,1],
[0,0,0]
]

}

else if(type==="O"){

return[
[2,2],
[2,2]
]

}

else if(type==="L"){

return[
[0,3,0],
[0,3,0],
[0,3,3]
]

}

else if(type==="J"){

return[
[0,4,0],
[0,4,0],
[4,4,0]
]

}

else if(type==="I"){

return[
[0,5,0,0],
[0,5,0,0],
[0,5,0,0],
[0,5,0,0]
]

}

else if(type==="S"){

return[
[0,6,6],
[6,6,0],
[0,0,0]
]

}

else if(type==="Z"){

return[
[7,7,0],
[0,7,7],
[0,0,0]
]

}

}


/* =======================
   描画
======================= */

function drawMatrix(matrix,offset){

matrix.forEach((row,y)=>{

row.forEach((value,x)=>{

if(value!==0){

context.fillStyle="cyan"

context.fillRect(
x+offset.x,
y+offset.y,
1,
1
)

}

})

})

}


/* =======================
   画面描画
======================= */

function draw(){

context.fillStyle="#000"

context.fillRect(
0,
0,
canvas.width,
canvas.height
)

drawMatrix(arena,{x:0,y:0})

drawMatrix(player.matrix,player.pos)

}


/* =======================
   衝突判定
======================= */

function collide(arena,player){

const m=player.matrix
const o=player.pos

for(let y=0;y<m.length;y++){

for(let x=0;x<m[y].length;x++){

if(
m[y][x]!==0 &&
(arena[y+o.y] &&
arena[y+o.y][x+o.x])!==0
){

return true

}

}

}

return false

}


/* =======================
   ブロック固定
======================= */

function merge(arena,player){

player.matrix.forEach((row,y)=>{

row.forEach((value,x)=>{

if(value!==0){

arena[y+player.pos.y][x+player.pos.x]=value

}

})

})

}


/* =======================
   ライン消し
======================= */

function arenaSweep(){

let rowCount=1

outer:
for(let y=arena.length-1;y>0;y--){

for(let x=0;x<arena[y].length;x++){

if(arena[y][x]===0){

continue outer

}

}

const row=arena.splice(y,1)[0].fill(0)

arena.unshift(row)

y++

score+=rowCount*10

rowCount*=2

}

}


/* =======================
   落下
======================= */

function playerDrop(){

player.pos.y++

if(collide(arena,player)){

player.pos.y--

merge(arena,player)

playerReset()

arenaSweep()

updateScore()

}

dropCounter=0

}


/* =======================
   移動
======================= */

function playerMove(dir){

player.pos.x+=dir

if(collide(arena,player)){

player.pos.x-=dir

}

}


/* =======================
   回転
======================= */

function rotate(matrix){

for(let y=0;y<matrix.length;y++){

for(let x=0;x<y;x++){

[
matrix[x][y],
matrix[y][x]

]=[
matrix[y][x],
matrix[x][y]
]

}

}

matrix.forEach(row=>row.reverse())

}


/* =======================
   プレイヤー回転
======================= */

function playerRotate(){

rotate(player.matrix)

if(collide(arena,player)){

rotate(player.matrix)

rotate(player.matrix)

rotate(player.matrix)

}

}


/* =======================
   新しいブロック
======================= */

function playerReset(){

const pieces="TJLOSZI"

player.matrix=createPiece(

pieces[Math.floor(Math.random()*pieces.length)]

)

player.pos.y=0
player.pos.x=5

if(collide(arena,player)){

arena.forEach(row=>row.fill(0))

score=0
updateScore()

}

}


/* =======================
   キー操作
======================= */

document.addEventListener("keydown",event=>{

if(event.keyCode===37){

playerMove(-1)

}

else if(event.keyCode===39){

playerMove(1)

}

else if(event.keyCode===40){

playerDrop()

}

else if(event.keyCode===38){

playerRotate()

}

})


/* =======================
   ゲームループ
======================= */

let dropCounter=0
let dropInterval=1000
let lastTime=0

function update(time=0){

const delta=time-lastTime

lastTime=time

dropCounter+=delta

if(dropCounter>dropInterval){

playerDrop()

}

draw()

requestAnimationFrame(update)

}


/* =======================
   開始
======================= */

playerReset()
updateScore()
update()

</script>

</body>
</html>
